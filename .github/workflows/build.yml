on:
  push:
    branches:
      - master
    paths:
      - charlotte.spec
      - pyproject.toml
      - uv.lock
      - .github/workflows/build.yml
  pull_request:
    paths:
      - charlotte.spec
      - pyproject.toml
      - uv.lock
      - .github/workflows/build.yml
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Download custom ffmpeg
        run: gh release download tools --pattern ffmpeg.exe --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build with PyInstaller
        run: uv run pyinstaller charlotte.spec

      - name: Smoke test
        run: dist/charlotte.exe --help
